name: CI

on:
  pull_request:
  push:
    branches:
      - "release/**"
    tags:
      - "*"

jobs:
  native-and-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"

      - name: Native Build
        run: |
          bazel build //:sql_demo //:stream_demo //:velaria_pyext

      - name: Native Regression
        run: |
          ./scripts/run_core_regression.sh

      - name: Same-host Observability Regression
        run: |
          ./scripts/run_stream_observability_regression.sh

      - name: Experimental Regression
        run: |
          bazel test //:experimental_regression

      - name: Python Ecosystem Regression
        env:
          FEISHU_BITABLE_APP_ID: ${{ secrets.FEISHU_BITABLE_APP_ID }}
          FEISHU_BITABLE_APP_SECRET: ${{ secrets.FEISHU_BITABLE_APP_SECRET }}
          FEISHU_BITABLE_BASE_URL: ${{ vars.FEISHU_BITABLE_BASE_URL }}
          FEISHU_BITABLE_OWNER_FIELD: ${{ vars.FEISHU_BITABLE_OWNER_FIELD }}
        run: |
          ./scripts/run_python_ecosystem_regression.sh

      - name: Python Stage Benchmark
        env:
          VELARIA_STAGE_BENCH_ROWS: "100000"
          VELARIA_STAGE_BENCH_ROUNDS: "1"
        run: |
          ./scripts/run_python_stage_benchmark.sh

  python-wrapper-leak-smoke:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"

      - name: Python Wrapper Leak Smoke
        env:
          VELARIA_WRAPPER_STRESS_ITERATIONS: "1"
          VELARIA_WRAPPER_LEAK_ITERATIONS: "1"
        run: |
          chmod +x ./scripts/run_python_wrapper_leak_smoke.sh
          ./scripts/run_python_wrapper_leak_smoke.sh

  python-wrapper-sanitizer:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install native toolchain bits
        run: |
          sudo apt-get update
          sudo apt-get install -y gcc g++

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"

      - name: Python Wrapper Sanitizer Smoke
        env:
          VELARIA_WRAPPER_STRESS_ITERATIONS: "1"
        run: |
          chmod +x ./scripts/run_python_wrapper_sanitizer.sh
          ./scripts/run_python_wrapper_sanitizer.sh

  wheel-manylinux:
    if: startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release/')
    runs-on: ${{ matrix.runs-on }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            arch: x86_64
            runs-on: ubuntu-22.04
          - python-version: "3.13"
            arch: x86_64
            runs-on: ubuntu-22.04
          - python-version: "3.12"
            arch: aarch64
            runs-on: ubuntu-22.04-arm
          - python-version: "3.13"
            arch: aarch64
            runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"

      - name: Build native wheel
        run: |
          BAZEL_SIMD_FLAGS=()
          if [[ "${{ matrix.arch }}" == "x86_64" ]]; then
            BAZEL_SIMD_FLAGS+=(--per_file_copt=src/dataflow/core/execution/runtime/simd_backend_avx2\\.cc@-mavx2)
          fi
          bazel build "${BAZEL_SIMD_FLAGS[@]}" //python_api:velaria_native_whl
          mkdir -p dist/linux
          cp bazel-bin/python_api/velaria-*-native.whl dist/linux/
          python3 ./scripts/normalize_wheel_filename.py dist/linux/velaria-*-native.whl

      - name: Repair wheel to manylinux
        run: |
          python -m pip install auditwheel
          auditwheel repair \
            --wheel-dir dist/linux \
            dist/linux/velaria-*.whl
          rm -f dist/linux/velaria-*-linux_*.whl

      - name: Verify repaired wheel architecture
        run: |
          ls dist/linux/velaria-*.whl
          python3 - <<'PY'
          import pathlib
          arch = "${{ matrix.arch }}"
          wheels = list(pathlib.Path("dist/linux").glob("velaria-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one repaired wheel, got {len(wheels)}")
          name = wheels[0].name
          expected = "x86_64" if arch == "x86_64" else "aarch64"
          if expected not in name:
              raise SystemExit(f"wheel {name} does not contain expected arch marker {expected}")
          print(f"wheel ok: {name}")
          PY

      - name: Validate manylinux wheel contents
        run: |
          python3 ./scripts/validate_native_wheel.py dist/linux/velaria-*.whl python_api/velaria

      - name: Verify SIMD backend from repaired wheel
        run: |
          python -m venv .venv-release-simd
          source .venv-release-simd/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/linux/velaria-*.whl
          python ./scripts/verify_release_simd.py --arch ${{ matrix.arch }}

      - name: Upload manylinux wheel
        uses: actions/upload-artifact@v4
        with:
          name: velaria-manylinux-${{ matrix.arch }}-wheel-py${{ matrix.python-version }}
          path: dist/linux/*.whl

  wheel-macos:
    if: startsWith(github.ref, 'refs/tags/') || startsWith(github.ref, 'refs/heads/release/')
    runs-on: macos-14
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"
          echo "VELARIA_PLATFORM_TAG=macosx_10_13_universal2" >> "$GITHUB_ENV"

      - name: Build macOS native wheel
        run: |
          bazel build \
            --copt=-arch \
            --copt=arm64 \
            --copt=-arch \
            --copt=x86_64 \
            --linkopt=-arch \
            --linkopt=arm64 \
            --linkopt=-arch \
            --linkopt=x86_64 \
            //python_api:velaria_native_whl
          mkdir -p dist/macos
          cp bazel-bin/python_api/velaria-*-native.whl dist/macos/
          python3 ./scripts/normalize_wheel_filename.py dist/macos/velaria-*-native.whl

      - name: Validate macOS wheel contents
        run: |
          python3 ./scripts/validate_native_wheel.py \
            dist/macos/velaria-*.whl \
            python_api/velaria \
            arm64,x86_64

      - name: Upload macOS wheel
        uses: actions/upload-artifact@v4
        with:
          name: velaria-macos-universal2-wheel-py${{ matrix.python-version }}
          path: dist/macos/*.whl
