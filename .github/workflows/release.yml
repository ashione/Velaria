name: Release

on:
  push:
    tags:
      - "v*"
      - "release-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (vX.Y.Z or release-vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Read package version
        id: version
        run: |
          VERSION="$(./scripts/get_velaria_version.sh)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Read tag name
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || '' }}"
          if [[ -z "${TAG}" ]]; then
            TAG="${GITHUB_REF_NAME:-}"
          fi
          if [[ -z "${TAG}" ]]; then
            echo "workflow_dispatch requires a tag ref" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: |
          RAW_TAG="${{ steps.tag.outputs.tag }}"
          case "${RAW_TAG}" in
            release-v*)
              TAG_VERSION="${RAW_TAG#release-v}"
              ;;
            v*)
              TAG_VERSION="${RAW_TAG#v}"
              ;;
            *)
              echo "unsupported tag ${RAW_TAG}; expected vX.Y.Z or release-vX.Y.Z" >&2
              exit 1
              ;;
          esac
          PACKAGE_VERSION="${{ steps.version.outputs.version }}"
          if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "tag ${RAW_TAG} does not match package version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

  wheel-manylinux:
    runs-on: ubuntu-22.04
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"

      - name: Build native wheel
        run: |
          bazel build //python_api:velaria_native_whl
          mkdir -p dist/linux
          cp bazel-bin/python_api/velaria-*-native.whl dist/linux/
          python3 ./scripts/normalize_wheel_filename.py dist/linux/velaria-*-native.whl

      - name: Repair wheel to manylinux
        run: |
          python -m pip install auditwheel
          auditwheel repair \
            --wheel-dir dist/linux \
            dist/linux/velaria-*.whl
          rm -f dist/linux/velaria-*-linux_*.whl

      - name: Validate manylinux wheel contents
        run: |
          python3 ./scripts/validate_native_wheel.py dist/linux/velaria-*.whl python_api/velaria

      - name: Upload manylinux artifact
        uses: actions/upload-artifact@v4
        with:
          name: velaria-manylinux-wheel-py${{ matrix.python-version }}
          path: dist/linux/*.whl

  wheel-macos:
    runs-on: macos-14
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"
          echo "VELARIA_PLATFORM_TAG=macosx_10_13_universal2" >> "$GITHUB_ENV"

      - name: Build macOS native wheel
        run: |
          bazel build \
            --copt=-arch \
            --copt=arm64 \
            --copt=-arch \
            --copt=x86_64 \
            --linkopt=-arch \
            --linkopt=arm64 \
            --linkopt=-arch \
            --linkopt=x86_64 \
            //python_api:velaria_native_whl
          mkdir -p dist/macos
          cp bazel-bin/python_api/velaria-*-native.whl dist/macos/
          python3 ./scripts/normalize_wheel_filename.py dist/macos/velaria-*-native.whl

      - name: Validate macOS wheel contents
        run: |
          python3 ./scripts/validate_native_wheel.py \
            dist/macos/velaria-*.whl \
            python_api/velaria \
            arm64,x86_64

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: velaria-macos-universal2-wheel-py${{ matrix.python-version }}
          path: dist/macos/*.whl

  publish-release:
    runs-on: ubuntu-latest
    needs:
      - validate-version
      - wheel-manylinux
      - wheel-macos
    steps:
      - name: Download manylinux artifact
        uses: actions/download-artifact@v4
        with:
          pattern: velaria-manylinux-wheel-py*
          path: dist/release
          merge-multiple: true

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          pattern: velaria-macos-universal2-wheel-py*
          path: dist/release
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/release/*.whl
