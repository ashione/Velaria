name: Release

on:
  push:
    tags:
      - "v*"
      - "release-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Release tag to publish (vX.Y.Z or release-vX.Y.Z)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  validate-version:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.version.outputs.version }}
      tag: ${{ steps.tag.outputs.tag }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Read package version
        id: version
        run: |
          VERSION="$(./scripts/get_velaria_version.sh)"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"

      - name: Read tag name
        id: tag
        run: |
          TAG="${{ github.event.inputs.tag || '' }}"
          if [[ -z "${TAG}" ]]; then
            TAG="${GITHUB_REF_NAME:-}"
          fi
          if [[ -z "${TAG}" ]]; then
            echo "workflow_dispatch requires a tag ref" >&2
            exit 1
          fi
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"

      - name: Verify tag matches package version
        run: |
          RAW_TAG="${{ steps.tag.outputs.tag }}"
          case "${RAW_TAG}" in
            release-v*)
              TAG_VERSION="${RAW_TAG#release-v}"
              ;;
            v*)
              TAG_VERSION="${RAW_TAG#v}"
              ;;
            *)
              echo "unsupported tag ${RAW_TAG}; expected vX.Y.Z or release-vX.Y.Z" >&2
              exit 1
              ;;
          esac
          PACKAGE_VERSION="${{ steps.version.outputs.version }}"
          if [[ "${TAG_VERSION}" != "${PACKAGE_VERSION}" ]]; then
            echo "tag ${RAW_TAG} does not match package version ${PACKAGE_VERSION}" >&2
            exit 1
          fi

  wheel-manylinux:
    runs-on: ${{ matrix.runs-on }}
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        include:
          - python-version: "3.12"
            arch: x86_64
            runs-on: ubuntu-22.04
          - python-version: "3.13"
            arch: x86_64
            runs-on: ubuntu-22.04
          - python-version: "3.12"
            arch: aarch64
            runs-on: ubuntu-22.04-arm
          - python-version: "3.13"
            arch: aarch64
            runs-on: ubuntu-22.04-arm
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"

      - name: Build native wheel
        run: |
          BAZEL_SIMD_FLAGS=()
          if [[ "${{ matrix.arch }}" == "x86_64" ]]; then
            BAZEL_SIMD_FLAGS+=(--per_file_copt=src/dataflow/core/execution/runtime/simd_backend_avx2\\.cc@-mavx2)
          fi
          bazel build "${BAZEL_SIMD_FLAGS[@]}" //python_api:velaria_native_whl
          mkdir -p dist/linux
          cp bazel-bin/python_api/velaria-*-native.whl dist/linux/
          python3 ./scripts/normalize_wheel_filename.py dist/linux/velaria-*-native.whl

      - name: Repair wheel to manylinux
        run: |
          python -m pip install auditwheel
          auditwheel repair \
            --wheel-dir dist/linux \
            dist/linux/velaria-*.whl
          rm -f dist/linux/velaria-*-linux_*.whl

      - name: Verify repaired wheel architecture
        run: |
          ls dist/linux/velaria-*.whl
          python3 - <<'PY'
          import pathlib
          import sys
          arch = "${{ matrix.arch }}"
          wheels = list(pathlib.Path("dist/linux").glob("velaria-*.whl"))
          if len(wheels) != 1:
              raise SystemExit(f"expected exactly one repaired wheel, got {len(wheels)}")
          name = wheels[0].name
          expected = "x86_64" if arch == "x86_64" else "aarch64"
          if expected not in name:
              raise SystemExit(f"wheel {name} does not contain expected arch marker {expected}")
          print(f"wheel ok: {name}")
          PY

      - name: Validate manylinux wheel contents
        run: |
          python3 ./scripts/validate_native_wheel.py dist/linux/velaria-*.whl python_api/velaria

      - name: Verify SIMD backend from repaired wheel
        run: |
          python -m venv .venv-release-simd
          source .venv-release-simd/bin/activate
          python -m pip install --upgrade pip
          python -m pip install dist/linux/velaria-*.whl
          python ./scripts/verify_release_simd.py --arch ${{ matrix.arch }}

      - name: Upload manylinux artifact
        uses: actions/upload-artifact@v4
        with:
          name: velaria-manylinux-${{ matrix.arch }}-wheel-py${{ matrix.python-version }}
          path: dist/linux/*.whl

  wheel-macos:
    runs-on: macos-14
    needs: validate-version
    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.12", "3.13"]
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"
          echo "VELARIA_PLATFORM_TAG=macosx_10_13_universal2" >> "$GITHUB_ENV"

      - name: Build macOS native wheel
        run: |
          bazel build \
            --copt=-arch \
            --copt=arm64 \
            --copt=-arch \
            --copt=x86_64 \
            --linkopt=-arch \
            --linkopt=arm64 \
            --linkopt=-arch \
            --linkopt=x86_64 \
            //python_api:velaria_native_whl
          mkdir -p dist/macos
          cp bazel-bin/python_api/velaria-*-native.whl dist/macos/
          python3 ./scripts/normalize_wheel_filename.py dist/macos/velaria-*-native.whl

      - name: Validate macOS wheel contents
        run: |
          python3 ./scripts/validate_native_wheel.py \
            dist/macos/velaria-*.whl \
            python_api/velaria \
            arm64,x86_64

      - name: Upload macOS artifact
        uses: actions/upload-artifact@v4
        with:
          name: velaria-macos-universal2-wheel-py${{ matrix.python-version }}
          path: dist/macos/*.whl

  app-macos:
    runs-on: macos-14
    needs: validate-version
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.inputs.tag || github.ref_name }}

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.13"

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: "22"
          cache: npm
          cache-dependency-path: app/package-lock.json

      - name: Install desktop app dependencies
        working-directory: app
        run: npm ci

      - name: Prepare macOS signing inputs
        if: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && secrets.APPLE_API_KEY_P8_BASE64 != '' && secrets.APPLE_API_KEY_ID != '' && secrets.APPLE_API_ISSUER != '' }}
        env:
          MACOS_CERTIFICATE_P12_BASE64: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 }}
          MACOS_CERTIFICATE_PASSWORD: ${{ secrets.MACOS_CERTIFICATE_PASSWORD }}
          APPLE_API_KEY_P8_BASE64: ${{ secrets.APPLE_API_KEY_P8_BASE64 }}
          APPLE_API_KEY_ID: ${{ secrets.APPLE_API_KEY_ID }}
          APPLE_API_ISSUER: ${{ secrets.APPLE_API_ISSUER }}
        run: |
          CERT_PATH="${RUNNER_TEMP}/velaria-macos-cert.p12"
          API_KEY_PATH="${RUNNER_TEMP}/AuthKey_${APPLE_API_KEY_ID}.p8"

          echo "${MACOS_CERTIFICATE_P12_BASE64}" | base64 --decode > "${CERT_PATH}"
          echo "${APPLE_API_KEY_P8_BASE64}" | base64 --decode > "${API_KEY_PATH}"

          echo "CSC_LINK=${CERT_PATH}" >> "$GITHUB_ENV"
          echo "CSC_KEY_PASSWORD=${MACOS_CERTIFICATE_PASSWORD}" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY=${API_KEY_PATH}" >> "$GITHUB_ENV"
          echo "APPLE_API_KEY_ID=${APPLE_API_KEY_ID}" >> "$GITHUB_ENV"
          echo "APPLE_API_ISSUER=${APPLE_API_ISSUER}" >> "$GITHUB_ENV"

      - name: Build macOS app and dmg
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: ${{ secrets.MACOS_CERTIFICATE_P12_BASE64 != '' && secrets.MACOS_CERTIFICATE_PASSWORD != '' && 'true' || 'false' }}
        run: |
          bash ./app/scripts/package-macos.sh

      - name: Stage macOS app artifacts
        run: |
          mkdir -p dist/macos-app
          cp out/electron/dist/Velaria-*.dmg dist/macos-app/

      - name: Upload macOS app artifact
        uses: actions/upload-artifact@v4
        with:
          name: velaria-macos-arm64-app
          path: |
            dist/macos-app/*.dmg

  publish-release:
    if: ${{ always() && needs.validate-version.result == 'success' && needs.wheel-manylinux.result == 'success' && needs.wheel-macos.result == 'success' && needs.app-macos.result == 'success' }}
    runs-on: ubuntu-latest
    needs:
      - validate-version
      - wheel-manylinux
      - wheel-macos
      - app-macos
    steps:
      - name: Download manylinux artifact
        uses: actions/download-artifact@v4
        with:
          pattern: velaria-manylinux-*-wheel-py*
          path: dist/release
          merge-multiple: true

      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          pattern: velaria-macos-universal2-wheel-py*
          path: dist/release
          merge-multiple: true

      - name: Download macOS app artifact
        uses: actions/download-artifact@v4
        with:
          pattern: velaria-macos-arm64-app
          path: dist/release
          merge-multiple: true

      - name: Publish GitHub release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ needs.validate-version.outputs.tag }}
          generate_release_notes: true
          files: |
            dist/release/*.whl
            dist/release/*.dmg
