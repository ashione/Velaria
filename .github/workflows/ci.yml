name: CI

on:
  pull_request:

jobs:
  native-and-python:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup uv
        uses: astral-sh/setup-uv@v5

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"

      - name: Native Build
        run: |
          bazel build //:sql_demo //:stream_demo //:velaria_pyext

      - name: Native Regression
        run: |
          bazel test \
            //:planner_v03_test \
            //:sql_regression_test \
            //:stream_runtime_test \
            //:stream_actor_credit_test \
            //:source_sink_abi_test \
            //:stream_strategy_explain_test

      - name: Same-host Observability Regression
        run: |
          ./scripts/run_stream_observability_regression.sh

      - name: Python Regression
        env:
          FEISHU_BITABLE_APP_ID: ${{ secrets.FEISHU_BITABLE_APP_ID }}
          FEISHU_BITABLE_APP_SECRET: ${{ secrets.FEISHU_BITABLE_APP_SECRET }}
          FEISHU_BITABLE_BASE_URL: ${{ vars.FEISHU_BITABLE_BASE_URL }}
          FEISHU_BITABLE_OWNER_FIELD: ${{ vars.FEISHU_BITABLE_OWNER_FIELD }}
        run: |
          bazel test \
            //python_api:custom_stream_source_test \
            //python_api:streaming_v05_test \
            //python_api:arrow_stream_ingestion_test \
            //python_api:bitable_stream_source_test \
            //python_api:bitable_group_by_owner_integration_test \
            --test_env=FEISHU_BITABLE_APP_ID \
            --test_env=FEISHU_BITABLE_APP_SECRET \
            --test_env=FEISHU_BITABLE_BASE_URL \
            --test_env=FEISHU_BITABLE_OWNER_FIELD

      - name: Python Smoke
        run: |
          ./scripts/run_python_ci_checks.sh

  wheel-manylinux:
    runs-on: ubuntu-22.04
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"

      - name: Build native wheel
        run: |
          bazel build //python_api:velaria_native_whl
          mkdir -p dist/linux
          cp bazel-bin/python_api/velaria-*-native.whl dist/linux/
          python3 ./scripts/normalize_wheel_filename.py dist/linux/velaria-*-native.whl

      - name: Repair wheel to manylinux
        run: |
          python -m pip install auditwheel
          auditwheel repair \
            --wheel-dir dist/linux \
            dist/linux/velaria-*.whl
          rm -f dist/linux/velaria-*-linux_*.whl

      - name: Upload manylinux wheel
        uses: actions/upload-artifact@v4
        with:
          name: velaria-manylinux-wheel
          path: dist/linux/*.whl

  wheel-macos:
    runs-on: macos-14
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Bazelisk
        uses: bazelbuild/setup-bazelisk@v3

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Configure Python for Bazel
        run: |
          echo "VELARIA_PYTHON_BIN=$(which python)" >> "$GITHUB_ENV"

      - name: Build macOS native wheel
        run: |
          bazel build //python_api:velaria_native_whl
          mkdir -p dist/macos
          cp bazel-bin/python_api/velaria-*-native.whl dist/macos/
          python3 ./scripts/normalize_wheel_filename.py dist/macos/velaria-*-native.whl

      - name: Upload macOS wheel
        uses: actions/upload-artifact@v4
        with:
          name: velaria-macos-wheel
          path: dist/macos/*.whl
